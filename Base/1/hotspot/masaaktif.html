<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>Période active</title>
    <link rel="icon" href="assets/img/favicon.png" sizes="32x32" type="image/png">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background-color: #fff;
            font-family: 'Arial', sans-serif;
        }

        .appHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8f8f8;
            border-bottom: 1px solid #e5e5e5;
        }

        .headerButton svg {
            width: 28px;
            height: 28px;
        }

        .pageTitle {
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }

        .splash-page {
            text-align: center;
            padding: 40px 20px;
        }

        .splash-page h2 {
            font-size: 20px;
            color: #333;
        }

        .splash-page p {
            color: #555;
        }

        iframe.badge {
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 14px;
            background-color: #ffc107;
            color: #000;
            margin-top: 8px;
            min-width: 120px;
            height: 32px;
        }

        .fixed-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #fff;
            padding: 10px;
            border-top: 1px solid #e0e0e0;
        }

        .btn-block {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
        }

        .btn-outline-secondary {
            border: 2px solid #ccc;
            color: #333;
            background: transparent;
        }

        .btn-primary {
            background-color: #6236FF;
            color: #fff;
            border: none;
        }

        .btn-primary:hover {
            background-color: #4e27d1;
        }
    </style>
</head>

<body>

    <!-- App Header -->
    <div class="appHeader">
        <a href="#" class="headerButton goBack">
            <svg viewBox="0 0 24 24" fill="#6236FF" xmlns="http://www.w3.org/2000/svg">
                <path d="M15.41,16.58L10.83,12L15.41,7.41L14,6L8,12L14,18L15.41,16.58Z" />
            </svg>
        </a>
        <div class="pageTitle">Période active</div>
        <div class="right"></div>
    </div>

    <!-- App Capsule -->
    <div id="appCapsule">
        <div class="section">
            <div class="splash-page mt-5 mb-5">
                <div class="mb-3">
                    <img src="assets/img/faq.svg" alt="image" class="imaged w-50 square">
                </div>
                <h2>Code : $(username)</h2>
                <p>Se termine le :<br>
                    <iframe class="badge badge-warning" frameborder="0" scrolling="no"
                        src="https://jwifi.bj.mikhmon.link/status/status.php?name=$(username)&session=Moailte">
                    </iframe>
                </p>
            </div>
        </div>

        <div class="fixed-bar">
            <div class="row g-2">
                <div class="col-6">
                    <a href="bantuan.html" class="btn btn-outline-secondary btn-block">Contactez-nous</a>
                </div>
                <div class="col-6">
                    <a href="status.html" class="btn btn-primary btn-block">Retour</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/lib/bootstrap.bundle.min.js"></script>
    <script src="assets/js/base.js"></script>

    <!-- Tawk.to -->
    <script type="text/javascript">
        var Tawk_API = Tawk_API || {}, Tawk_LoadStart = new Date();
        (function () {
            var s1 = document.createElement("script"), s0 = document.getElementsByTagName("script")[0];
            s1.async = true;
            s1.src = 'https://embed.tawk.to/64e6136f94cf5d49dc6c140e/1h8hbnr2a';
            s1.charset = 'UTF-8';
            s1.setAttribute('crossorigin', '*');
            s0.parentNode.insertBefore(s1, s0);
        })();
    </script>

</body>

</html>
